<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pong Frontend Test</title>
  <style>
    canvas {
      background: #000;
      display: block;
      margin: 2rem auto;
      border: 2px solid #fff;
    }
    body {
      text-align: center;
      color: white;
      background-color: #222;
      font-family: sans-serif;
    }
  </style>
</head>
<body>
  <h1>Pong Frontend Test</h1>
  <p id="status">Connecting...</p>
  <canvas id="gameCanvas" width="500" height="500"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let socket = null;
    let roomId = null;
    let left = 'P1';
    let right = 'P2';
    let started = false;
    let gameOver = false;
    let gameType = null;
    const keyPressed = {};
    let keyInt = null;

    function draw(game) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Ball
      ctx.beginPath();
      ctx.arc(game.ballX, game.ballY, 12.5, 0, 2 * Math.PI);
      ctx.fillStyle = 'white';
      ctx.fill();

      // Paddles
      ctx.fillStyle = 'white';
      ctx.fillRect(game.paddle1.x, game.paddle1.y, game.paddle1.width, game.paddle1.height);
      ctx.fillRect(game.paddle2.x, game.paddle2.y, game.paddle2.width, game.paddle2.height);

      // Scores
      ctx.font = '20px sans-serif';
      ctx.fillText(`${left}: ${game.player1Score}`, 50, 30);
      ctx.fillText(`${right}: ${game.player2Score}`, canvas.width - 100, 30);
    }

    // Send paddle movement with arrow keys
    window.addEventListener('keydown', (e) => {
      keyPressed[e.key] = true;
      if (['ArrowUp', 'ArrowDown'].includes(e.key) && started) {
        e.preventDefault(); // Prevent scrolling
      }
    });
    window.addEventListener('keyup', (e) => {
      keyPressed[e.key] = false;
      if (['ArrowUp', 'ArrowDown'].includes(e.key) && started) {
        e.preventDefault(); // Prevent scrolling
      }
    });

    function handleInput() {
      if (!socket || socket.readyState !== WebSocket.OPEN) return;

      if (gameType === 'local') {
        if (keyPressed['w']) {
          socket.send(JSON.stringify({ type: 'localMove', direction: 'up', paddleNumber: 1 }));
        }
        if (keyPressed['s']) {
          socket.send(JSON.stringify({ type: 'localMove', direction: 'down', paddleNumber: 1 }));
        }
        if (keyPressed['ArrowUp']) {
          socket.send(JSON.stringify({ type: 'localMove', direction: 'up', paddleNumber: 2 }));
        }
        if (keyPressed['ArrowDown']) {
          socket.send(JSON.stringify({ type: 'localMove', direction: 'down', paddleNumber: 2 }));
        }
      } else if (gameType === 'ai') {
        if (keyPressed['ArrowUp']) {
          socket.send(JSON.stringify({ type: 'aiMove', direction: 'up' }));
        }
        if (keyPressed['ArrowDown']) {
          socket.send(JSON.stringify({ type: 'aiMove', direction: 'down' }));
        }
      }
    }

// local game
    function connect() {
      socket = new WebSocket(`wss://${location.hostname}/ws`);

      socket.onopen = () => {
        if (roomId == null) {
          document.getElementById('status').textContent = 'Connected - Joining...';
          socket.send(JSON.stringify({ type: 'local' }));
        }
        else {
          socket.send(JSON.stringify({ type: 'localReconnect', roomId: roomId }));

          document.getElementById('status').innerHTML = `
            Disconnected. Click the button to reconnect.
            <button id="reconnectBtn">Reconnect</button>
          `;
          document.getElementById('reconnectBtn').onclick = () => {
            socket.send(JSON.stringify({ type: 'localReconnect', roomId: roomId }));
          };
        }

      };
      socket.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'waiting_ready') {
          roomId = msg.roomId;
          document.getElementById('status').innerHTML = `<form id="playername">
              <label>Player Left: <input id="p1" required></label><br>
              <label>Player Right: <input id="p2" required></label><br>
              <button type="submit">Start Game</button>
            </form>`;
          const form = document.getElementById('playername');
          if (!form) {
              console.error("playerForm not found in the DOM!");
              return;
          }
          form.addEventListener('submit', async function(event) {
              event.preventDefault();

              left = document.getElementById("p1").value;
              right = document.getElementById("p2").value;
              socket.send(JSON.stringify({ type: 'localReady', roomId: roomId }));
          });
        } else if (msg.type === 'game_start') {
          started = true;
          keyInt = setInterval(handleInput, 1000 / 30);
          document.getElementById('status').textContent = `Game started!`;
        } else if (msg.type === 'game_tick') {
          draw(msg.state);
        } else if (msg.type === 'game_over') {
          gameOver = true;
          started = false;
          clearInterval(keyInt);
          if (msg.winner.id === 1) {
            document.getElementById('status').textContent = `Game Over! Winner: ${left}`;
          } else {
            document.getElementById('status').textContent = `Game Over! Winner: ${right}`;
          }
        } else if (msg.type === 'room_closed') {
          document.getElementById('status').textContent = `Room closed: ${msg.reason}`;
        } else if (msg.type === 'reconnected') {
          document.getElementById('status').textContent = `Reconnected to room ${msg.roomId}`;
        }
      };

      socket.onclose = () => {
        if (!gameOver && started) {
          connect();
        }
        if (!gameOver) {
          document.getElementById('status').textContent = 'Disconnected';
        }
      };

      socket.onerror = (err) => {
        console.error('WebSocket error:', err);
      };
    }

    // Ai Game
    function connectAi() {
      socket = new WebSocket(`wss://${location.hostname}/ws`);

      socket.onopen = () => {
        if (roomId == null) {
          document.getElementById('status').textContent = 'Connected - Joining...';
          socket.send(JSON.stringify({ type: 'ai' }));
        }
        else {
          socket.send(JSON.stringify({ type: 'aiReconnect', roomId: roomId }));

          document.getElementById('status').innerHTML = `
            Disconnected. Click the button to reconnect.
            <button id="reconnectBtn">Reconnect</button>
          `;
          document.getElementById('reconnectBtn').onclick = () => {
            socket.send(JSON.stringify({ type: 'aiReconnect', roomId: roomId }));
          };
        }

      };
      socket.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'waiting_ready') {
          roomId = msg.roomId;
          document.getElementById('status').innerHTML = `Please choose your paddle:<br>
              <button id="left">Left</button>
              <button id="right">Right</button>
            `;
          document.getElementById('left').onclick = () => {
            socket.send(JSON.stringify({ type: 'aiReadyLeft', roomId: roomId }));
          };
          document.getElementById('right').onclick = () => {
            socket.send(JSON.stringify({ type: 'aiReadyRight', roomId: roomId }));
          };
        } else if (msg.type === 'game_start') {
          started = true;
          keyInt = setInterval(handleInput, 1000 / 30);
          document.getElementById('status').textContent = `Game started!`;
        } else if (msg.type === 'game_tick') {
          draw(msg.state);
        } else if (msg.type === 'game_over') {
          gameOver = true;
          started = false;
          clearInterval(keyInt);
          if (msg.result.win === 1) {
            document.getElementById('status').textContent = `Game Over! You Win!`;
          } else {
            document.getElementById('status').textContent = `Game Over! You Lose!`;
          }
        } else if (msg.type === 'room_closed') {
          document.getElementById('status').textContent = `Room closed: ${msg.reason}`;
        } else if (msg.type === 'reconnected') {
          document.getElementById('status').textContent = `Reconnected to room ${msg.roomId}`;
        }
      };

      socket.onclose = () => {
        if (!gameOver && started) {
          connectAi();
        }
        if (!gameOver) {
          document.getElementById('status').textContent = 'Disconnected';
        }
      };

      socket.onerror = (err) => {
        console.error('WebSocket error:', err);
      };
    }

    window.addEventListener('load', async () => {
            document.getElementById('status').innerHTML = `
            Please choose the game type you want.<br>
            <button id="local">Local 1v1</button>
            <button id="ai">Local with computer</button>
          `;
          document.getElementById('local').onclick = () => {
            gameType = 'local';
            connect();
          };
          document.getElementById('ai').onclick = () => {
            gameType = 'ai';
            connectAi();
          };
        });
  </script>
</body>
</html>
