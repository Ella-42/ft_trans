# Automatically determine number of workers based on available CPU cores
worker_processes auto;

# Maximum connections per worker
events
{
	worker_connections 1024;
}

http
{
	# MIME types for correct content serving
	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	# Http
	server
	{
		listen 80;
		listen [::]:80;

		# Resolve both root and www subdomain
		server_name ${domain} www.${domain};

		# Redirect http traffic to https
		location /
		{
			return 301 https://$host$request_uri;
		}
	}

	# Https
	server
	{
		listen 443 ssl;
		listen [::]:443 ssl;

		# Resolve both root and www subdomain
		server_name ${domain} www.${domain};

		# Use faster http protocol and hide Nginx version
		http2 on;
		server_tokens off;

		# SSL certificates
		ssl_certificate /etc/ssl/trans_ella-peeters_me/trans_ella-peeters_me.crt;
		ssl_certificate_key /etc/ssh/ella-peeters.me.key;
		ssl_trusted_certificate /etc/ssl/trans_ella-peeters_me/trans_ella-peeters_me.ca-bundle;

		# Enforce strong cipher suite and secure TLS protocols, preferring newer version
		ssl_ciphers HIGH:!aNULL:!MD5;
		ssl_protocols TLSv1.3 TLSv1.2;

		# Proxy pass to NodeJS server
		location /
		{
			proxy_pass http://server:3443;
			proxy_set_header Host $host;
			proxy_set_header X-Real-Ip $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;

		}

		# Deny access to hidden files
		location ~ /\.
		{
			deny all;
		}
	}
	# Log requests and errors
	access_log /dev/stdout;
	error_log /dev/stderr;
}
