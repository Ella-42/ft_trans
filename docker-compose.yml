version: '3.7'

services:

  # Frontend
  nginx:
    container_name: nginx
    build: ./backend/webserver
    restart: on-failure:3
    env_file: .env #IP whitelist
    environment:
      - domain=trans.ella-peeters.me
    depends_on:
      - server
    networks:
      - frontend #Connects to server
    ports:
      - "80:80" #Http (-> https)
      - "443:443" #Https
    volumes:
      - /etc/ssl/trans_ella-peeters_me:/etc/ssl/trans_ella-peeters_me:ro #Mount SSL certificate
      - /home/lpeeters/.ssh/ella-peeters.me.key:/etc/ssh/ella-peeters.me.key:ro #Mount SSH key
      - ./backend/webserver/nginx.conf:/etc/nginx/nginx.conf:ro #Mount Nginx configuration
      - ./backend/webserver/ip_whitelist.js:/etc/nginx/ip_whitelist.js:ro #Mount IP whitelist fetching
      - ./frontend/test_environment/safe.html:/var/www/html/test_environment/safe.html:ro #Served statically for testing

  # Backend
  server:
    container_name: server
    build:
      context: .
      dockerfile: backend/server/Dockerfile
    restart: on-failure:3
    environment:
      - domain=trans.ella-peeters.me
    networks:
      - frontend #Connects to Nginx
    volumes:
      - db-volume:/var/www/db
      - ./backend/server/test.js:/var/www/js/test.js:ro

  # Purely for testing
  frontend-dummy:
    build:
      context: .
      dockerfile: ./dummy/Dockerfile
    container_name: frontend_dummy
    ports:
      - "8080:8080"
    volumes:
      - ./dummy/src/index.html:/var/www/dummy/index.html:ro
      - ./dummy/src/server.js:/var/www/dummy/server.js:ro
      - /etc/ssl/trans_ella-peeters_me:/etc/ssl/trans_ella-peeters_me:ro #Mount SSL certificate
      - /home/lpeeters/.ssh/ella-peeters.me.key:/etc/ssh/ella-peeters.me.key:ro #Mount SSH key
    networks:
      - frontend
    restart: always

volumes:
  db-volume:
    name: sqlite
    driver_opts:
      o: bind
      type: none
      device: ./data/sqlite

# Network for frontend
networks:
  frontend:
    name: frontend
    driver: bridge