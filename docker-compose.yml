version: '3.7'

services:

  # Frontend
  nginx:
    container_name: nginx
    build: ./backend/webserver
    restart: on-failure:3
    environment:
      - domain=trans.ella-peeters.me
    depends_on:
      - server
    networks:
      - frontend #Connects to server
    ports:
      - "80:80" #Http (-> https)
      - "443:443" #Https
    volumes:
      - /etc/ssl/trans_ella-peeters_me:/etc/ssl/trans_ella-peeters_me:ro #Mount SSL certificate
      - /home/lpeeters/.ssh/ella-peeters.me.key:/etc/ssh/ella-peeters.me.key:ro #Mount SSH key
      - ./backend/webserver/nginx.conf:/etc/nginx/nginx.conf:ro #Mount Nginx configuration

  # Frontend and backend
  server:
    container_name: server
    build: ./backend/server
    restart: on-failure:3
    #env_file: .env #Users and passwords
    environment:
      - domain=trans.ella-peeters.me
    #depends_on:
      #- sqlite
    networks:
      - frontend #Connects to Nginx
      #- backend #Connects to SQLite
    volumes:
      - ./backend/server/test.js:/var/www/js/test.js:ro

  # Backend database
  #sqlite:
    #container_name: sqlite
    #build: ./sqlite
    #restart: on-failure:3
    #env_file: .env #Users and passwords
    #networks:
      #- backend #Connects to server

# Split frontend and backend
networks:
  frontend:
  #backend:
